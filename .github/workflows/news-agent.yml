name: News Agent — Daily Issue Update

on:
  schedule:
    # Runs daily at 8am ET (1pm UTC)
    - cron: "0 13 * * *"
  workflow_dispatch:
    # Also triggerable manually from the GitHub Actions tab

jobs:
  update-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news agent
        run: node scripts/news-agent.mjs
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
